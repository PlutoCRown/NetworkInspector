<style>
  .ni-card {
    border: 1px solid var(--ni-border, #e5e7eb);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.4;
  }
  .ni-card__title {
    font-weight: 600;
  }
  .ni-card__title[data-tone="danger"] {
    color: #dc2626;
  }
  .ni-card__title[data-tone="success"] {
    color: #16a34a;
  }
  .ni-card__desc {
    margin-top: 4px;
    color: #6b7280;
    font-size: 12px;
  }
  .ni-card__expand {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #e5e7eb;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
<!-- x-card 标记为卡片根节点，x-title 标记为标题节点， highlight 标记为高亮标题节点,如果命中highlight规则，会替换掉相同x-name的，x-expand 标记为展开节点，x-popover 标记为弹出节点,x-if会只在用户填写了这个字段的时候才展示 -->
<article class="ni-card" x-card>
  <div class="ni-card__title" x-name="title">{{title}}</div>
  <div class="ni-card__title highlight" x-name="title" highlight>{{title}}</div>

  <div class="ni-card__desc" x-if="desc">
    <span>{{desc}}</span>
  </div>

</article>
<div class="ni-card__expand" x-expand>{{expend}}</div>
<div x-popover>{{popover}}</div>
